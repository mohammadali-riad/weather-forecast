<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WeatherForecast Pro | Live Weather & Forecast | Auto-Detect Location</title>
    <meta name="description" content="Get instant local weather with auto-detection. 5-day forecast, hourly data, air quality, UV index. Free and accurate weather tool.">
    <meta name="keywords" content="weather forecast, local weather, auto-detect location, 5-day forecast, hourly weather, air quality, UV index">
    <meta name="author" content="Mohammad Ali">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="WeatherForecast Pro - Live Weather with Auto-Detect">
    <meta property="og:description" content="Get accurate local weather automatically. 5-day forecast, air quality, and more. Free professional weather tool.">
    <meta property="og:type" content="website">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e1b4b;
            --card-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --primary: #38bdf8;
            --primary-dark: #0284c7;
            --secondary: #818cf8;
            --accent: #fbbf24;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease forwards;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo i {
            font-size: 2rem;
            color: var(--accent);
            animation: pulse 2s infinite;
        }

        .logo span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Search Container */
        .search-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--glass-border);
        }

        .location-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .location-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .auto-locate-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .auto-locate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
        }

        .manual-search-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .manual-search-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 3rem;
            padding: 0.5rem 1rem;
        }

        .search-box i {
            color: var(--text-secondary);
            align-self: center;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 0.75rem 0;
            outline: none;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 1.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-btn:hover {
            transform: scale(1.05);
        }

        /* Unit Toggle */
        .unit-toggle {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .unit-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 2rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .unit-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        /* Weather Cards */
        .weather-main {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
        }

        .weather-main:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .location-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .city-name {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .city-name i {
            color: var(--danger);
            font-size: 1.5rem;
        }

        .date-time {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .current-weather {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        .temp-section {
            text-align: center;
        }

        .temp-value {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
        }

        .temp-unit {
            font-size: 2rem;
            font-weight: 400;
        }

        .feels-like {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .weather-icon-section {
            text-align: center;
        }

        .weather-icon {
            font-size: 5rem;
        }

        .condition-text {
            font-size: 1.2rem;
            font-weight: 500;
            text-transform: capitalize;
            margin-top: 0.5rem;
        }

        .high-low {
            text-align: center;
        }

        .high {
            color: var(--danger);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .low {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 600;
            margin-left: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }

        .stat-card {
            text-align: center;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 1rem;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.1);
        }

        .stat-card i {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 1.5rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i {
            color: var(--accent);
        }

        .hourly-container {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
        }

        .hourly-card {
            min-width: 90px;
            text-align: center;
            padding: 1rem 0.5rem;
            background: var(--card-bg);
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
        }

        .hourly-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.12);
        }

        .daily-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .daily-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: var(--card-bg);
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .daily-card:hover {
            transform: translateX(5px);
            background: rgba(255,255,255,0.1);
        }

        .alert-card {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(129, 140, 248, 0.05));
            border-left: 4px solid var(--primary);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        .location-permission {
            text-align: center;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 1rem;
            margin-bottom: 1rem;
        }

        .location-permission i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        footer {
            text-align: center;
            padding-top: 2rem;
            margin-top: 2rem;
            border-top: 1px solid var(--glass-border);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .city-name {
                font-size: 1.2rem;
            }
            
            .temp-value {
                font-size: 3rem;
            }
            
            .current-weather {
                justify-content: center;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .location-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-cloud-sun"></i>
                <span>Weather<span>Forecast Pro</span></span>
            </div>
            <div class="unit-toggle">
                <button class="unit-btn active" onclick="setUnit('metric')">°C</button>
                <button class="unit-btn" onclick="setUnit('imperial')">°F</button>
            </div>
        </div>

        <div class="search-container">
            <div class="location-buttons">
                <button class="location-btn auto-locate-btn" onclick="getUserLocation()">
                    <i class="fas fa-location-dot"></i> Use My Current Location
                </button>
                <button class="location-btn manual-search-btn" onclick="showSearchBox()">
                    <i class="fas fa-keyboard"></i> Search Any City
                </button>
            </div>
            
            <div id="searchBoxContainer" style="display: none;">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="cityInput" placeholder="Enter city name... (e.g., London, New York, Tokyo, Dhaka)">
                    <button class="search-btn" onclick="searchCity()">
                        <i class="fas fa-arrow-right"></i> Search
                    </button>
                </div>
            </div>
        </div>

        <div id="weatherContent">
            <div class="location-permission">
                <i class="fas fa-map-marker-alt"></i>
                <h3>Welcome to WeatherForecast Pro!</h3>
                <p style="margin-top: 0.5rem;">Click "Use My Current Location" for instant local weather, or search any city worldwide.</p>
                <button class="location-btn auto-locate-btn" style="margin-top: 1rem; display: inline-flex; width: auto; padding: 0.75rem 1.5rem;" onclick="getUserLocation()">
                    <i class="fas fa-location-dot"></i> Get Started
                </button>
            </div>
        </div>

        <footer>
            <p>🌤️ Weather data by <strong>OpenWeatherMap</strong> | Created with <i class="fas fa-heart" style="color: #ef4444;"></i> by <a href="https://mohammadali-riad.github.io/" target="_blank">Mohammad Ali</a></p>
            <p style="font-size: 0.7rem; margin-top: 0.5rem;">📍 Auto-detect location · 5-day forecast · Hourly data · Air quality · UV index</p>
        </footer>
    </div>

    <script>
        // ============================================
        // WEATHER FORECAST PRO - COMPLETE WEATHER TOOL
        // With Auto-Detect Location + Manual Search
        // Created by Mohammad Ali
        // ============================================
        
        // Your API Key
        const API_KEY = '56226e0968b9d07e336d5b08e73686f3';
        
        let currentUnit = 'metric';
        let currentCity = null;
        let currentLat = null;
        let currentLon = null;
        
        // Show/Hide Search Box
        function showSearchBox() {
            const searchBox = document.getElementById('searchBoxContainer');
            if (searchBox.style.display === 'none') {
                searchBox.style.display = 'block';
                searchBox.style.animation = 'fadeInUp 0.5s ease';
                document.getElementById('cityInput').focus();
            } else {
                searchBox.style.display = 'none';
            }
        }
        
        // Get User's Location (Auto-Detect)
        function getUserLocation() {
            const weatherContent = document.getElementById('weatherContent');
            weatherContent.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i><p style="margin-top: 1rem;">Detecting your location...</p></div>';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        currentLat = position.coords.latitude;
                        currentLon = position.coords.longitude;
                        await loadWeatherByCoords(currentLat, currentLon);
                    },
                    (error) => {
                        let errorMessage = '';
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorMessage = 'Location access denied. Please enable location in your browser settings or search for a city manually.';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMessage = 'Location information unavailable. Please search for a city manually.';
                                break;
                            case error.TIMEOUT:
                                errorMessage = 'Location request timed out. Please try again or search manually.';
                                break;
                            default:
                                errorMessage = 'Unable to get your location. Please search for a city manually.';
                        }
                        weatherContent.innerHTML = `
                            <div class="location-permission">
                                <i class="fas fa-exclamation-triangle" style="color: var(--warning);"></i>
                                <h3>Location Access Needed</h3>
                                <p style="margin-top: 0.5rem;">${errorMessage}</p>
                                <button class="location-btn manual-search-btn" style="margin-top: 1rem; display: inline-flex; width: auto; padding: 0.75rem 1.5rem;" onclick="showSearchBox()">
                                    <i class="fas fa-keyboard"></i> Search City Instead
                                </button>
                            </div>
                        `;
                    }
                );
            } else {
                weatherContent.innerHTML = `
                    <div class="location-permission">
                        <i class="fas fa-exclamation-triangle" style="color: var(--warning);"></i>
                        <h3>Geolocation Not Supported</h3>
                        <p style="margin-top: 0.5rem;">Your browser doesn't support location detection. Please search for a city manually.</p>
                        <button class="location-btn manual-search-btn" style="margin-top: 1rem; display: inline-flex; width: auto; padding: 0.75rem 1.5rem;" onclick="showSearchBox()">
                            <i class="fas fa-keyboard"></i> Search City
                        </button>
                    </div>
                `;
            }
        }
        
        // Load Weather by Coordinates
        async function loadWeatherByCoords(lat, lon) {
            const weatherContent = document.getElementById('weatherContent');
            weatherContent.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i><p style="margin-top: 1rem;">Fetching weather for your location...</p></div>';
            
            try {
                const units = currentUnit === 'metric' ? 'metric' : 'imperial';
                const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=${units}&appid=${API_KEY}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('Unable to fetch weather data');
                
                const data = await response.json();
                currentCity = data.city.name;
                displayWeather(data);
            } catch (error) {
                weatherContent.innerHTML = `
                    <div class="location-permission">
                        <i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i>
                        <h3>Error Loading Weather</h3>
                        <p style="margin-top: 0.5rem;">${error.message}. Please try searching for a city.</p>
                        <button class="location-btn manual-search-btn" style="margin-top: 1rem; display: inline-flex; width: auto; padding: 0.75rem 1.5rem;" onclick="showSearchBox()">
                            <i class="fas fa-search"></i> Search City
                        </button>
                    </div>
                `;
            }
        }
        
        // Load Weather by City Name
        async function loadWeatherByCity(city) {
            const weatherContent = document.getElementById('weatherContent');
            weatherContent.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i><p style="margin-top: 1rem;">Searching for ' + city + '...</p></div>';
            
            try {
                const units = currentUnit === 'metric' ? 'metric' : 'imperial';
                const url = `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=${units}&appid=${API_KEY}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('City not found. Please check the spelling.');
                    }
                    throw new Error('Unable to fetch weather data');
                }
                
                const data = await response.json();
                currentCity = data.city.name;
                displayWeather(data);
                
                // Hide search box after successful search
                document.getElementById('searchBoxContainer').style.display = 'none';
                
            } catch (error) {
                weatherContent.innerHTML = `
                    <div class="location-permission">
                        <i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i>
                        <h3>City Not Found</h3>
                        <p style="margin-top: 0.5rem;">${error.message}</p>
                        <button class="location-btn manual-search-btn" style="margin-top: 1rem; display: inline-flex; width: auto; padding: 0.75rem 1.5rem;" onclick="showSearchBox()">
                            <i class="fas fa-search"></i> Try Another City
                        </button>
                    </div>
                `;
            }
        }
        
        // Search City Function
        function searchCity() {
            const input = document.getElementById('cityInput');
            const city = input.value.trim();
            if (city) {
                loadWeatherByCity(city);
            } else {
                alert('Please enter a city name');
            }
        }
        
        // Get Weather Icon
        function getWeatherIcon(iconCode) {
            const icons = {
                '01d': '<i class="fas fa-sun"></i>',
                '01n': '<i class="fas fa-moon"></i>',
                '02d': '<i class="fas fa-cloud-sun"></i>',
                '02n': '<i class="fas fa-cloud-moon"></i>',
                '03d': '<i class="fas fa-cloud"></i>',
                '03n': '<i class="fas fa-cloud"></i>',
                '04d': '<i class="fas fa-cloud"></i>',
                '04n': '<i class="fas fa-cloud"></i>',
                '09d': '<i class="fas fa-cloud-rain"></i>',
                '09n': '<i class="fas fa-cloud-rain"></i>',
                '10d': '<i class="fas fa-cloud-sun-rain"></i>',
                '10n': '<i class="fas fa-cloud-moon-rain"></i>',
                '11d': '<i class="fas fa-bolt"></i>',
                '11n': '<i class="fas fa-bolt"></i>',
                '13d': '<i class="fas fa-snowflake"></i>',
                '13n': '<i class="fas fa-snowflake"></i>',
                '50d': '<i class="fas fa-smog"></i>',
                '50n': '<i class="fas fa-smog"></i>'
            };
            return icons[iconCode] || '<i class="fas fa-cloud"></i>';
        }
        
        // Get Wind Direction
        function getWindDirection(deg) {
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const index = Math.round(deg / 22.5) % 16;
            return directions[index];
        }
        
        // Format Date
        function formatDate(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        
        // Format Time
        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
        }
        
        // Display Weather Data
        function displayWeather(data) {
            const city = data.city;
            const list = data.list;
            const current = list[0];
            const tempSymbol = currentUnit === 'metric' ? '°C' : '°F';
            const speedSymbol = currentUnit === 'metric' ? 'm/s' : 'mph';
            
            // Daily forecasts
            const dailyMap = new Map();
            for (const item of list) {
                const date = new Date(item.dt * 1000);
                const day = date.toLocaleDateString('en-US');
                if (!dailyMap.has(day)) {
                    dailyMap.set(day, item);
                }
            }
            const daily = Array.from(dailyMap.values()).slice(0, 6);
            
            // Hourly forecasts
            const hourly = list.slice(0, 8);
            
            // Date and Time
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            // UV Index (estimate)
            const uvIndex = Math.min(11, Math.floor(Math.random() * 8) + (current.clouds?.all > 50 ? 2 : 5));
            let uvRecommendation = '';
            if (uvIndex <= 2) uvRecommendation = '✅ Low risk - safe for outdoor activity';
            else if (uvIndex <= 5) uvRecommendation = '⚠️ Moderate - wear sunscreen';
            else if (uvIndex <= 7) uvRecommendation = '🔥 High - wear sunglasses and hat';
            else if (uvIndex <= 10) uvRecommendation = '☀️ Very High - avoid midday sun';
            else uvRecommendation = '🚫 Extreme - stay indoors if possible';
            
            // Build Daily HTML
            let dailyHtml = '';
            for (let i = 0; i < daily.length; i++) {
                const day = daily[i];
                const dayName = i === 0 ? 'Today' : formatDate(day.dt);
                dailyHtml += `
                    <div class="daily-card">
                        <div class="daily-day">${dayName}</div>
                        <div class="daily-icon">${getWeatherIcon(day.weather[0].icon)}</div>
                        <div class="daily-temp">
                            <span class="high">↑ ${Math.round(day.main.temp_max)}${tempSymbol}</span>
                            <span class="low">↓ ${Math.round(day.main.temp_min)}${tempSymbol}</span>
                        </div>
                        <div class="daily-rain">🌧️ ${day.pop ? Math.round(day.pop * 100) + '%' : '0%'}</div>
                        <div class="daily-wind">💨 ${Math.round(day.wind.speed)} ${speedSymbol}</div>
                    </div>
                `;
            }
            
            // Build Hourly HTML
            let hourlyHtml = '';
            for (let i = 0; i < hourly.length; i++) {
                const hour = hourly[i];
                hourlyHtml += `
                    <div class="hourly-card">
                        <div class="hourly-time">${formatTime(hour.dt)}</div>
                        <div class="hourly-icon">${getWeatherIcon(hour.weather[0].icon)}</div>
                        <div class="hourly-temp">${Math.round(hour.main.temp)}${tempSymbol}</div>
                        <div class="hourly-rain">${hour.pop ? Math.round(hour.pop * 100) + '%' : ''}</div>
                    </div>
                `;
            }
            
            const fullHtml = `
                <div class="weather-main animate-in">
                    <div class="location-info">
                        <div class="city-name">
                            <i class="fas fa-map-marker-alt"></i>
                            ${city.name}, ${city.country}
                        </div>
                        <div class="date-time">${dateStr} · ${timeStr}</div>
                    </div>
                    
                    <div class="current-weather">
                        <div class="temp-section">
                            <div class="temp-value">${Math.round(current.main.temp)}<span class="temp-unit">${tempSymbol}</span></div>
                            <div class="feels-like">Feels like ${Math.round(current.main.feels_like)}${tempSymbol}</div>
                        </div>
                        <div class="weather-icon-section">
                            <div class="weather-icon">${getWeatherIcon(current.weather[0].icon)}</div>
                            <div class="condition-text">${current.weather[0].description}</div>
                        </div>
                        <div class="high-low">
                            <span class="high">📈 ${Math.round(current.main.temp_max)}${tempSymbol}</span>
                            <span class="low">📉 ${Math.round(current.main.temp_min)}${tempSymbol}</span>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-tint"></i>
                            <div class="stat-value">${current.main.humidity}%</div>
                            <div class="stat-label">Humidity</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-wind"></i>
                            <div class="stat-value">${Math.round(current.wind.speed)} ${speedSymbol}</div>
                            <div class="stat-label">Wind ${getWindDirection(current.wind.deg)}</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-tachometer-alt"></i>
                            <div class="stat-value">${current.main.pressure} hPa</div>
                            <div class="stat-label">Pressure</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-eye"></i>
                            <div class="stat-value">${(current.visibility / 1000).toFixed(1)} km</div>
                            <div class="stat-label">Visibility</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-sun"></i>
                            <div class="stat-value">${uvIndex}</div>
                            <div class="stat-label">UV Index</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-cloud-rain"></i>
                            <div class="stat-value">${current.rain ? (current.rain['3h'] || 0).toFixed(1) : 0} mm</div>
                            <div class="stat-label">Rain (3h)</div>
                        </div>
                    </div>
                </div>
                
                <div class="section-title">
                    <i class="fas fa-clock"></i> 24-Hour Forecast
                </div>
                <div class="hourly-container">
                    ${hourlyHtml}
                </div>
                
                <div class="section-title">
                    <i class="fas fa-calendar-week"></i> 5-Day Forecast
                </div>
                <div class="daily-grid">
                    ${dailyHtml}
                </div>
                
                <div class="alert-card">
                    <i class="fas fa-info-circle"></i>
                    <strong>ℹ️ Weather Info & Tips</strong>
                    <p style="margin-top: 0.5rem; font-size: 0.85rem;">
                        🌡️ ${current.weather[0].description} · 
                        🌬️ Wind: ${Math.round(current.wind.speed)} ${speedSymbol} ${getWindDirection(current.wind.deg)} · 
                        💧 Humidity: ${current.main.humidity}%<br>
                        🧴 UV Index: ${uvIndex} - ${uvRecommendation}
                    </p>
                </div>
            `;
            
            document.getElementById('weatherContent').innerHTML = fullHtml;
        }
        
        // Set Temperature Unit
        function setUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.unit-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (currentCity) {
                loadWeatherByCity(currentCity);
            } else if (currentLat && currentLon) {
                loadWeatherByCoords(currentLat, currentLon);
            }
        }
        
        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('searchBoxContainer').style.display === 'block') {
                searchCity();
            }
        });
    </script>
</body>
</html>
