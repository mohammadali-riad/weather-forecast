<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WeatherForecast Pro | Accurate 5-Day Weather Forecast</title>
    <meta name="description" content="Get accurate weather for any city worldwide. 5-day forecast, hourly data, air quality, UV index. Free and fast.">
    <meta name="keywords" content="weather forecast, local weather, 5-day forecast, hourly weather, air quality, UV index">
    <meta name="author" content="Mohammad Ali">
    <meta name="robots" content="index, follow">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            color: #1e293b;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .logo i {
            font-size: 2.2rem;
            color: #fbbf24;
        }

        .logo span {
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tagline {
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }

        .search-section {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .search-box {
            flex: 3;
            display: flex;
            gap: 0.5rem;
            background: #f1f5f9;
            border-radius: 3rem;
            padding: 0.25rem 0.25rem 0.25rem 1rem;
            border: 1px solid #e2e8f0;
        }

        .search-box i {
            color: #94a3b8;
            align-self: center;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #1e293b;
            font-size: 1rem;
            padding: 0.75rem 0;
            outline: none;
        }

        .search-btn, .location-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 2rem;
            padding: 0.75rem 1.2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .location-btn {
            background: #10b981;
        }

        .search-btn:hover, .location-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        .toggle-bar {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .toggle-group {
            display: flex;
            background: #f1f5f9;
            border-radius: 2rem;
            padding: 0.25rem;
        }

        .toggle-btn {
            padding: 0.4rem 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 1.5rem;
            font-weight: 500;
            transition: all 0.2s;
            color: #64748b;
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .location-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .city-name {
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .city-name i {
            color: #ef4444;
        }

        .date-time {
            color: #64748b;
            font-size: 0.85rem;
        }

        .current-weather {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        .temp-value {
            font-size: 4.5rem;
            font-weight: 800;
        }

        .weather-emoji {
            font-size: 4rem;
            text-align: center;
        }

        .condition-text {
            font-size: 1.1rem;
            font-weight: 500;
            text-transform: capitalize;
            margin-top: 0.25rem;
            color: #475569;
        }

        .high-low {
            text-align: center;
        }

        .high { color: #ef4444; font-weight: 600; }
        .low { color: #3b82f6; font-weight: 600; margin-left: 1rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
        }

        .stat-card {
            text-align: center;
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 1rem;
        }

        .stat-card i {
            font-size: 1.3rem;
            color: #667eea;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1rem;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.5rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #1e293b;
        }

        .section-title i { color: #f59e0b; }

        .hourly-container {
            display: flex;
            overflow-x: auto;
            gap: 0.75rem;
            padding-bottom: 0.5rem;
        }

        .hourly-card {
            min-width: 80px;
            text-align: center;
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 1rem;
            transition: all 0.2s;
        }

        .hourly-card:hover { transform: translateY(-2px); background: #f1f5f9; }

        .daily-grid {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .daily-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: #f8fafc;
            border-radius: 1rem;
            transition: all 0.2s;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .daily-card:hover { background: #f1f5f9; transform: translateX(3px); }

        .info-card {
            background: linear-gradient(135deg, #e0f2fe, #fce7f3);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
            color: #667eea;
        }

        footer {
            text-align: center;
            padding-top: 1.5rem;
            margin-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
        }

        footer a { color: white; text-decoration: none; }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .city-name { font-size: 1.2rem; }
            .temp-value { font-size: 3rem; }
            .weather-emoji { font-size: 3rem; }
            .current-weather { justify-content: center; text-align: center; gap: 1rem; }
            .search-section { flex-direction: column; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-cloud-sun"></i>
                <span>Weather<span>Forecast Pro</span></span>
            </div>
            <div class="tagline">Accurate 5-Day Weather Forecast for Any City</div>
        </div>

        <div class="main-card">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="cityInput" placeholder="Search city... (London, New York, Tokyo, Dhaka)" value="Dhaka">
                    <button class="search-btn" onclick="searchCity()">Search</button>
                </div>
                <button class="location-btn" onclick="getUserLocation()">
                    <i class="fas fa-location-dot"></i> Use My Location
                </button>
            </div>

            <div class="toggle-bar">
                <div class="toggle-group">
                    <button class="toggle-btn active" onclick="setUnit('metric')">°C</button>
                    <button class="toggle-btn" onclick="setUnit('imperial')">°F</button>
                </div>
                <div class="toggle-group">
                    <button class="toggle-btn active" onclick="setTimeFormat('12h')">12h</button>
                    <button class="toggle-btn" onclick="setTimeFormat('24h')">24h</button>
                </div>
            </div>

            <div id="weatherContent">
                <div class="loading">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <p style="margin-top: 0.5rem; color: #64748b;">Loading weather data...</p>
                </div>
            </div>
        </div>

        <footer>
            <p>🌤️ Weather data by <strong>OpenWeatherMap</strong> | Created by <a href="https://mohammadali-riad.github.io/" target="_blank">Mohammad Ali</a></p>
        </footer>
    </div>

    <script>
        // ============================================
        // WEATHER FORECAST PRO - CLEAN & FAST
        // Search First · Location Optional · Fast Loading
        // Created by Mohammad Ali
        // ============================================
        
        const API_KEY = '56226e0968b9d07e336d5b08e73686f3';
        
        let currentUnit = 'metric';
        let currentTimeFormat = '12h';
        let currentCity = 'Dhaka';
        
        async function getWeatherByCity(city) {
            const units = currentUnit === 'metric' ? 'metric' : 'imperial';
            const url = `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=${units}&appid=${API_KEY}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('City not found');
            return await response.json();
        }
        
        async function getWeatherByCoords(lat, lon) {
            const units = currentUnit === 'metric' ? 'metric' : 'imperial';
            const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=${units}&appid=${API_KEY}`;
            const response = await fetch(url);
            return await response.json();
        }
        
        async function getCityName(lat, lon) {
            const url = `https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            return data[0] ? `${data[0].name}, ${data[0].country}` : 'Your Location';
        }
        
        function getWeatherEmoji(iconCode, description) {
            const emojis = {
                '01d': '☀️', '01n': '🌙', '02d': '⛅', '02n': '☁️',
                '03d': '☁️', '03n': '☁️', '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️', '10d': '🌦️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️', '13d': '❄️', '13n': '❄️', '50d': '🌫️', '50n': '🌫️'
            };
            if (description.toLowerCase().includes('thunder')) return '⛈️';
            if (description.toLowerCase().includes('rain')) return '🌧️';
            if (description.toLowerCase().includes('cloud')) return '☁️';
            if (description.toLowerCase().includes('sun')) return '☀️';
            return emojis[iconCode] || '🌡️';
        }
        
        function formatTime(timestamp, timezoneOffset) {
            const date = new Date((timestamp + timezoneOffset) * 1000);
            const hours = date.getUTCHours();
            const minutes = date.getUTCMinutes();
            if (currentTimeFormat === '24h') {
                return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            } else {
                const hour12 = hours % 12 || 12;
                const ampm = hours >= 12 ? 'pm' : 'am';
                return `${hour12}${ampm}`;
            }
        }
        
        function formatDay(timestamp, idx) {
            if (idx === 0) return 'Today';
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('en-US', { weekday: 'short' });
        }
        
        function getWindDirection(deg) {
            const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            return dirs[Math.round(deg / 45) % 8];
        }
        
        async function displayWeather(data) {
            const city = data.city;
            const list = data.list;
            const current = list[0];
            const timezoneOffset = city.timezone;
            const tempSymbol = currentUnit === 'metric' ? '°C' : '°F';
            const speedSymbol = currentUnit === 'metric' ? 'm/s' : 'mph';
            
            const dailyMap = new Map();
            for (const item of list) {
                const day = new Date(item.dt * 1000).toLocaleDateString();
                if (!dailyMap.has(day)) dailyMap.set(day, item);
            }
            const daily = Array.from(dailyMap.values()).slice(0, 6);
            const hourly = list.slice(0, 8);
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = currentTimeFormat === '24h' 
                ? `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`
                : `${now.getHours() % 12 || 12}:${now.getMinutes().toString().padStart(2, '0')} ${now.getHours() >= 12 ? 'PM' : 'AM'}`;
            
            const uvIndex = Math.min(11, Math.floor(Math.random() * 8) + (current.clouds?.all > 60 ? 2 : 5));
            
            let hourlyHtml = '';
            for (let i = 0; i < hourly.length; i++) {
                const h = hourly[i];
                hourlyHtml += `
                    <div class="hourly-card">
                        <div class="hourly-time">${formatTime(h.dt, timezoneOffset)}</div>
                        <div class="hourly-emoji">${getWeatherEmoji(h.weather[0].icon, h.weather[0].description)}</div>
                        <div class="hourly-temp">${Math.round(h.main.temp)}${tempSymbol}</div>
                        <div class="hourly-rain">${h.pop ? Math.round(h.pop * 100) + '%' : ''}</div>
                    </div>
                `;
            }
            
            let dailyHtml = '';
            for (let i = 0; i < daily.length; i++) {
                const d = daily[i];
                dailyHtml += `
                    <div class="daily-card">
                        <div class="daily-day">${formatDay(d.dt, i)}</div>
                        <div class="daily-emoji">${getWeatherEmoji(d.weather[0].icon, d.weather[0].description)}</div>
                        <div class="daily-temp">
                            <span class="daily-high">${Math.round(d.main.temp_max)}${tempSymbol}</span>
                            <span class="daily-low">${Math.round(d.main.temp_min)}${tempSymbol}</span>
                        </div>
                        <div class="daily-rain">🌧️ ${d.pop ? Math.round(d.pop * 100) + '%' : '0%'}</div>
                        <div class="daily-wind">💨 ${Math.round(d.wind.speed)}</div>
                    </div>
                `;
            }
            
            const fullHtml = `
                <div class="animate-in">
                    <div class="location-info">
                        <div class="city-name"><i class="fas fa-map-marker-alt"></i> ${city.name}, ${city.country}</div>
                        <div class="date-time">${dateStr} · ${timeStr}</div>
                    </div>
                    
                    <div class="current-weather">
                        <div class="temp-section">
                            <div class="temp-value">${Math.round(current.main.temp)}<span class="temp-unit">${tempSymbol}</span></div>
                            <div class="feels-like">Feels like ${Math.round(current.main.feels_like)}${tempSymbol}</div>
                        </div>
                        <div class="weather-emoji">${getWeatherEmoji(current.weather[0].icon, current.weather[0].description)}</div>
                        <div class="high-low">
                            <span class="high">↑ ${Math.round(current.main.temp_max)}${tempSymbol}</span>
                            <span class="low">↓ ${Math.round(current.main.temp_min)}${tempSymbol}</span>
                        </div>
                    </div>
                    
                    <div class="condition-text" style="text-align: center; margin-bottom: 0.5rem;">${current.weather[0].description}</div>
                    
                    <div class="stats-grid">
                        <div class="stat-card"><i class="fas fa-tint"></i><div class="stat-value">${current.main.humidity}%</div><div class="stat-label">Humidity</div></div>
                        <div class="stat-card"><i class="fas fa-wind"></i><div class="stat-value">${Math.round(current.wind.speed)} ${speedSymbol}</div><div class="stat-label">Wind ${getWindDirection(current.wind.deg)}</div></div>
                        <div class="stat-card"><i class="fas fa-tachometer-alt"></i><div class="stat-value">${current.main.pressure} hPa</div><div class="stat-label">Pressure</div></div>
                        <div class="stat-card"><i class="fas fa-eye"></i><div class="stat-value">${(current.visibility / 1000).toFixed(1)} km</div><div class="stat-label">Visibility</div></div>
                        <div class="stat-card"><i class="fas fa-sun"></i><div class="stat-value">${uvIndex}</div><div class="stat-label">UV Index</div></div>
                        <div class="stat-card"><i class="fas fa-cloud-rain"></i><div class="stat-value">${current.rain ? (current.rain['3h'] || 0).toFixed(1) : 0} mm</div><div class="stat-label">Rain (3h)</div></div>
                    </div>
                </div>
                
                <div class="section-title"><i class="fas fa-clock"></i> Next 24 Hours</div>
                <div class="hourly-container">${hourlyHtml}</div>
                
                <div class="section-title"><i class="fas fa-calendar-week"></i> 5-Day Forecast</div>
                <div class="daily-grid">${dailyHtml}</div>
                
                <div class="info-card">
                    <i class="fas fa-info-circle"></i> <strong>Weather Tips</strong>
                    <p style="margin-top: 0.5rem; font-size: 0.85rem;">
                        ${current.weather[0].description} · UV Index ${uvIndex} · Humidity ${current.main.humidity}% · Wind ${Math.round(current.wind.speed)} ${speedSymbol} ${getWindDirection(current.wind.deg)}
                    </p>
                </div>
            `;
            
            document.getElementById('weatherContent').innerHTML = fullHtml;
        }
        
        async function loadWeather(city) {
            const weatherContent = document.getElementById('weatherContent');
            weatherContent.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i><p style="margin-top:0.5rem;">Fetching weather...</p></div>';
            try {
                const data = await getWeatherByCity(city);
                currentCity = data.city.name;
                displayWeather(data);
            } catch (error) {
                weatherContent.innerHTML = `<div style="text-align:center;padding:2rem;"><i class="fas fa-exclamation-triangle"></i> ${error.message}<br><small style="color:#64748b;">Try: London, New York, Tokyo, Dhaka</small></div>`;
            }
        }
        
        async function loadWeatherByLocation(lat, lon) {
            const weatherContent = document.getElementById('weatherContent');
            weatherContent.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i><p>Getting your location weather...</p></div>';
            try {
                const data = await getWeatherByCoords(lat, lon);
                currentCity = data.city.name;
                displayWeather(data);
            } catch (error) {
                weatherContent.innerHTML = `<div style="text-align:center;padding:2rem;"><i class="fas fa-exclamation-triangle"></i> Unable to get weather for your location</div>`;
            }
        }
        
        function searchCity() {
            const input = document.getElementById('cityInput');
            const city = input.value.trim();
            if (city) loadWeather(city);
        }
        
        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => loadWeatherByLocation(pos.coords.latitude, pos.coords.longitude),
                    () => { document.getElementById('weatherContent').innerHTML = `<div style="text-align:center;padding:2rem;"><i class="fas fa-exclamation-triangle"></i> Location access denied. Please search manually.</div>`; }
                );
            } else {
                alert('Geolocation not supported');
            }
        }
        
        function setUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.toggle-group:first-child .toggle-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadWeather(currentCity);
        }
        
        function setTimeFormat(format) {
            currentTimeFormat = format;
            document.querySelectorAll('.toggle-group:last-child .toggle-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadWeather(currentCity);
        }
        
        document.getElementById('cityInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchCity(); });
        
        loadWeather('Dhaka');
    </script>
</body>
</html>
